<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Timer</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    html, body {
      background: transparent;
      overflow: hidden;
      user-select: none;
      font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
      width: 100%;
      height: 100%;
      cursor: default;
    }

    .outer {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      background: transparent;
      pointer-events: none;
    }

    .timer-notch {
      display: flex;
      align-items: center;
      justify-content: center;
      background: #000;
      border-radius: 0 0 20px 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
      cursor: grab;
      position: relative;
      overflow: hidden;
      height: 42px;
      width: 200px;
      transition: width 0.3s ease;
      pointer-events: auto;
    }

    .timer-notch:active { cursor: grabbing; }

    .timer-notch.settings-open { width: 240px; }

    /* Timer View */
    .timer-view {
      display: flex;
      align-items: center;
      gap: 12px;
      width: 100%;
      height: 100%;
      justify-content: center;
    }

    .timer-btn {
      background: none;
      border: none;
      color: rgba(255,255,255,0.6);
      cursor: pointer;
      padding: 4px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
    }

    .timer-btn:hover {
      color: #fff;
      background: rgba(255,255,255,0.1);
    }

    .controls {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .time-display {
      font-size: 18px;
      font-weight: 500;
      letter-spacing: 3px;
      color: rgba(255,255,255,0.95);
      pointer-events: none;
      font-variant-numeric: tabular-nums;
      font-family: 'Consolas', 'Courier New', monospace;
    }

    /* Settings View */
    .settings-view {
      display: flex;
      align-items: center;
      gap: 8px;
      width: 100%;
      height: 100%;
      justify-content: center;
      padding: 0 8px;
    }

    .settings-view input {
      width: 32px;
      padding: 4px;
      background: rgba(255,255,255,0.1);
      color: #fff;
      font-size: 14px;
      text-align: center;
      border: none;
      border-radius: 4px;
      outline: none;
    }

    .settings-view input:focus {
      background: rgba(255,255,255,0.2);
    }

    .settings-sep {
      color: rgba(255,255,255,0.6);
      font-size: 14px;
    }

    .save-btn {
      padding: 4px 8px;
      background: #06b6d4;
      color: #fff;
      border: none;
      border-radius: 4px;
      font-size: 12px;
      cursor: pointer;
      transition: background 0.2s;
    }

    .save-btn:hover { background: #0891b2; }

    .cancel-btn {
      background: none;
      border: none;
      color: rgba(255,255,255,0.6);
      font-size: 12px;
      cursor: pointer;
    }

    .cancel-btn:hover { color: #fff; }

    .hidden { display: none !important; }

    /* SVG Icons */
    svg { width: 14px; height: 14px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
    .filled { fill: currentColor; }
  </style>
</head>
<body>
  <div class="outer">
    <div class="timer-notch" id="timerNotch">
      <!-- Timer View -->
      <div class="timer-view" id="timerView">
        <button class="timer-btn" id="modeBtn" title="Switch mode">
          <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
        </button>

        <div class="controls">
          <button class="timer-btn" id="playPauseBtn">
            <svg id="playIcon" class="filled" viewBox="0 0 24 24"><polygon points="5 3 19 12 5 21 5 3"/></svg>
            <svg id="pauseIcon" class="hidden filled" viewBox="0 0 24 24"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>
          </button>
          <button class="timer-btn" id="resetBtn">
            <svg viewBox="0 0 24 24"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/></svg>
          </button>
        </div>

        <div class="time-display" id="timeDisplay">00:00</div>

        <button class="timer-btn hidden" id="settingsBtn">
          <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
        </button>
      </div>

      <!-- Settings View -->
      <div class="settings-view hidden" id="settingsView">
        <input type="text" id="editHours" value="00" maxlength="2" placeholder="00">
        <span class="settings-sep">:</span>
        <input type="text" id="editMinutes" value="25" maxlength="2" placeholder="00">
        <span class="settings-sep">:</span>
        <input type="text" id="editSeconds" value="00" maxlength="2" placeholder="00">
        <button class="save-btn" id="saveSettingsBtn">✓</button>
        <button class="cancel-btn" id="cancelSettingsBtn">✕</button>
      </div>
    </div>
  </div>

  <script>
    console.log('=== TIMER SCRIPT STARTED ===');
    console.log('window.electronAPI:', window.electronAPI);
    
    if (!window.electronAPI) {
      console.error('❌ electronAPI is not available!');
    } else {
      console.log('✅ electronAPI is available');
    }

    // State (now synced from Master Clock)
    let seconds = 0;
    let isPaused = true;
    let mode = 'stopwatch'; // 'stopwatch' | 'pomodoro'
    let pomoDuration = 25 * 60;

    // DOM
    const notch = document.getElementById('timerNotch');
    const timerView = document.getElementById('timerView');
    const settingsView = document.getElementById('settingsView');
    const timeDisplay = document.getElementById('timeDisplay');
    const playIcon = document.getElementById('playIcon');
    const pauseIcon = document.getElementById('pauseIcon');
    const settingsBtn = document.getElementById('settingsBtn');
    const editHours = document.getElementById('editHours');
    const editMinutes = document.getElementById('editMinutes');
    const editSeconds = document.getElementById('editSeconds');

    console.log('DOM elements loaded:', {
      notch: !!notch,
      timerView: !!timerView,
      timeDisplay: !!timeDisplay
    });

    // ─── Format helpers ─────────────────────────────
    function formatTime(totalSeconds) {
      const h = Math.floor(totalSeconds / 3600);
      const m = Math.floor((totalSeconds % 3600) / 60);
      const s = totalSeconds % 60;
      if (h > 0) {
        return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
      }
      return `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
    }

    function updateDisplay() {
      timeDisplay.textContent = formatTime(seconds);
    }

    function updatePlayPauseIcon() {
      playIcon.classList.toggle('hidden', !isPaused);
      pauseIcon.classList.toggle('hidden', isPaused);
    }

    // ─── Sync with Master Clock ─────────────────────
    if (window.electronAPI.onTimerStateUpdate) {
      window.electronAPI.onTimerStateUpdate((state) => {
        seconds = state.seconds;
        isPaused = state.isPaused;
        mode = state.mode;
        pomoDuration = state.pomoDuration;
        
        updateDisplay();
        updatePlayPauseIcon();
        settingsBtn.classList.toggle('hidden', mode !== 'pomodoro');
      });
    }

    // ─── Button handlers ────────────────────────────
    document.getElementById('playPauseBtn').addEventListener('click', (e) => {
      e.stopPropagation();
      e.preventDefault();
      window.electronAPI.sendTimerAction({ type: 'TOGGLE_PLAY' });
    });

    document.getElementById('resetBtn').addEventListener('click', (e) => {
      e.stopPropagation();
      e.preventDefault();
      window.electronAPI.sendTimerAction({ type: 'RESET' });
    });

    document.getElementById('modeBtn').addEventListener('click', (e) => {
      e.stopPropagation();
      e.preventDefault();
      const newMode = mode === 'stopwatch' ? 'pomodoro' : 'stopwatch';
      window.electronAPI.sendTimerAction({ type: 'SET_MODE', mode: newMode });
    });

    // Settings
    settingsBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      e.preventDefault();
      const h = Math.floor(pomoDuration / 3600);
      const m = Math.floor((pomoDuration % 3600) / 60);
      const s = pomoDuration % 60;
      editHours.value = String(h).padStart(2, '0');
      editMinutes.value = String(m).padStart(2, '0');
      editSeconds.value = String(s).padStart(2, '0');
      timerView.classList.add('hidden');
      settingsView.classList.remove('hidden');
      notch.classList.add('settings-open');
    });

    document.getElementById('saveSettingsBtn').addEventListener('click', (e) => {
      e.stopPropagation();
      e.preventDefault();
      const h = parseInt(editHours.value) || 0;
      const m = parseInt(editMinutes.value) || 0;
      const s = parseInt(editSeconds.value) || 0;
      const newDuration = h * 3600 + m * 60 + s;
      window.electronAPI.sendTimerAction({ type: 'SET_MODE', mode: 'pomodoro', pomoDuration: newDuration });
      closeSettings();
    });

    document.getElementById('cancelSettingsBtn').addEventListener('click', (e) => {
      e.stopPropagation();
      e.preventDefault();
      closeSettings();
    });

    function closeSettings() {
      settingsView.classList.add('hidden');
      timerView.classList.remove('hidden');
      notch.classList.remove('settings-open');
    }

    // Input validation
    [editHours, editMinutes, editSeconds].forEach((input, i) => {
      const max = i === 0 ? 23 : 59;
      input.addEventListener('input', () => {
        input.value = input.value.replace(/\D/g, '');
        if (parseInt(input.value) > max) input.value = String(max);
      });
      input.addEventListener('blur', () => {
        if (!input.value) input.value = '00';
        else input.value = input.value.padStart(2, '0');
      });
      input.addEventListener('click', (e) => e.stopPropagation());
    });

    // ─── Dragging ───────────────────────────────────
    let isDragging = false;
    let dragStartX = 0;
    let dragStartY = 0;
    let windowStartX = 0;
    let rafId = null;
    let pointerId = null;
    const DRAG_THRESHOLD = 10; // pixels to move before considering it a drag

    // Initialize window position on load
    (async () => {
      const pos = await window.electronAPI.getTimerPosition();
      if (pos) {
        windowStartX = pos.x;
      }
      console.log('Timer initialized at position:', windowStartX);
    })();

    notch.addEventListener('pointerdown', (e) => {
      if (e.button !== 0) return;
      // Don't start drag if clicking a button or input
      if (e.target.closest('button') || e.target.closest('input')) {
        return;
      }
      
      e.preventDefault();
      notch.setPointerCapture(e.pointerId);
      pointerId = e.pointerId;
      dragStartX = e.screenX;
      dragStartY = e.screenY;
      // Don't set isDragging yet - wait for movement
    });

    notch.addEventListener('pointermove', (e) => {
      if (pointerId === null) return;
      
      // Check if we should start dragging
      if (!isDragging) {
        const deltaX = Math.abs(e.screenX - dragStartX);
        const deltaY = Math.abs(e.screenY - dragStartY);
        if (deltaX > DRAG_THRESHOLD || deltaY > DRAG_THRESHOLD) {
          isDragging = true;
          console.log('Started dragging');
        } else {
          return; // Don't move until threshold is reached
        }
      }
      
      const deltaX = e.screenX - dragStartX;
      const newX = windowStartX + deltaX;
      
      // Update immediately without RAF for smoother dragging
      window.electronAPI.moveTimerWindow(newX);
    });

    notch.addEventListener('pointerup', (e) => {
      if (pointerId !== null && notch.hasPointerCapture(pointerId)) {
        notch.releasePointerCapture(pointerId);
      }
      
      if (isDragging) {
        console.log('Drag ended');
        const deltaX = e.screenX - dragStartX;
        const finalX = windowStartX + deltaX;
        window.electronAPI.moveTimerWindow(finalX);
        windowStartX = finalX;
      }
      
      isDragging = false;
      pointerId = null;
    });

    notch.addEventListener('pointercancel', (e) => {
      if (pointerId !== null && notch.hasPointerCapture(pointerId)) {
        notch.releasePointerCapture(pointerId);
      }
      isDragging = false;
      pointerId = null;
    });

    // Init
    updateDisplay();

    // ─── Hover-based click-through toggle ───────────
    // Electron starts the window with setIgnoreMouseEvents(true, { forward: true })
    // so mouse moves are forwarded even when ignoring clicks.
    // We check if the cursor is over the notch pill and toggle accordingly.
    let isOverNotch = false;

    document.addEventListener('mousemove', (e) => {
      const rect = notch.getBoundingClientRect();
      const over = e.clientX >= rect.left && e.clientX <= rect.right &&
                   e.clientY >= rect.top  && e.clientY <= rect.bottom;

      if (over && !isOverNotch) {
        isOverNotch = true;
        window.electronAPI.setIgnoreMouseEvents(false);
      } else if (!over && isOverNotch && !isDragging) {
        isOverNotch = false;
        window.electronAPI.setIgnoreMouseEvents(true, { forward: true });
      }
    });
  </script>
</body>
</html>
