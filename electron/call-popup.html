<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Incoming Call</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: transparent;
      overflow: hidden;
      user-select: none;
      font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
    }

    .popup {
      width: 100vw;
      height: 100vh;
      background: rgba(0, 0, 0, 0.85);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border-radius: 16px;
      border: 1px solid rgba(255, 255, 255, 0.15);
      color: #fff;
      box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
      display: flex;
      flex-direction: column;
      padding: 20px;
      -webkit-app-region: drag;
      animation: slideIn 0.3s ease-out;
    }

    @keyframes slideIn {
      from { transform: translateY(-20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }

    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .pulse-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #ef4444;
      animation: pulse 1.5s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.5; transform: scale(0.8); }
    }

    .header-label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #f87171;
    }

    .call-type {
      font-size: 11px;
      color: rgba(255,255,255,0.4);
    }

    .caller-info {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      margin-bottom: 20px;
    }

    .caller-name {
      font-size: 20px;
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-bottom: 4px;
    }

    .caller-number {
      font-size: 13px;
      color: rgba(255,255,255,0.4);
      font-family: 'Consolas', 'Courier New', monospace;
    }

    .actions {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 12px;
      -webkit-app-region: no-drag;
    }

    .action-btn {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 10px 8px;
      border-radius: 12px;
      border: none;
      cursor: pointer;
      transition: all 0.2s;
    }

    .action-btn svg {
      width: 20px;
      height: 20px;
      margin-bottom: 4px;
      stroke: currentColor;
      fill: none;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .action-btn span {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      font-weight: 600;
    }

    .accept-btn {
      background: rgba(34, 197, 94, 0.2);
      color: #4ade80;
    }
    .accept-btn:hover { background: rgba(34, 197, 94, 0.3); }

    .decline-btn {
      background: rgba(239, 68, 68, 0.2);
      color: #f87171;
    }
    .decline-btn:hover { background: rgba(239, 68, 68, 0.3); }

    .silent-btn {
      background: rgba(156, 163, 175, 0.2);
      color: #9ca3af;
    }
    .silent-btn:hover { background: rgba(156, 163, 175, 0.3); }

    .waiting {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100%;
    }

    .waiting-text {
      animation: fadePulse 2s ease-in-out infinite;
      color: rgba(255,255,255,0.4);
    }

    @keyframes fadePulse {
      0%, 100% { opacity: 0.4; }
      50% { opacity: 1; }
    }
  </style>
</head>
<body>
  <!-- Waiting State -->
  <div class="popup" id="waitingState">
    <div class="waiting">
      <div class="waiting-text">Waiting for call data...</div>
    </div>
  </div>

  <!-- Call State -->
  <div class="popup" id="callState" style="display:none;">
    <div class="header">
      <div class="header-left">
        <div class="pulse-dot"></div>
        <span class="header-label">Incoming Call</span>
      </div>
      <span class="call-type" id="callType">Mobile</span>
    </div>

    <div class="caller-info">
      <h2 class="caller-name" id="callerName">Unknown Caller</h2>
      <p class="caller-number" id="callerNumber">+1 234 567 8900</p>
    </div>

    <div class="actions">
      <button class="action-btn accept-btn" id="acceptBtn">
        <svg viewBox="0 0 24 24"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
        <span>Accept</span>
      </button>
      <button class="action-btn decline-btn" id="declineBtn">
        <svg viewBox="0 0 24 24"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
        <span>Decline</span>
      </button>
      <button class="action-btn silent-btn" id="silentBtn">
        <svg viewBox="0 0 24 24"><path d="M13.73 21a2 2 0 0 1-3.46 0"/><path d="M18.63 13A17.89 17.89 0 0 1 18 8"/><path d="M6.26 6.26A5.86 5.86 0 0 0 6 8c0 7-3 9-3 9h14"/><path d="M18 8a6 6 0 0 0-9.33-5"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
        <span>Silent</span>
      </button>
    </div>
  </div>

  <script>
    const { electronAPI } = window;

    function showCall(data) {
      document.getElementById('waitingState').style.display = 'none';
      document.getElementById('callState').style.display = '';
      document.getElementById('callerName').textContent = data.name || 'Unknown Caller';
      document.getElementById('callerNumber').textContent = data.number || '+1 234 567 8900';
      document.getElementById('callType').textContent = data.type || 'Mobile';
    }

    // Listen for incoming call data
    electronAPI.onIncomingCall((data) => {
      showCall(data);
    });

    // Actions
    document.getElementById('acceptBtn').addEventListener('click', () => {
      electronAPI.sendCallAction('accept');
    });

    document.getElementById('declineBtn').addEventListener('click', () => {
      electronAPI.sendCallAction('decline');
    });

    document.getElementById('silentBtn').addEventListener('click', () => {
      electronAPI.sendCallAction('silent');
    });
  </script>
</body>
</html>
